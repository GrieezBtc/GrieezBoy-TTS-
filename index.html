<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElitePro TTS Mega</title>
    <style>
        :root { 
            --accent: #38bdf8; --bg: #0f172a; --card: #1e293b; 
            --text: #f1f5f9; --input-bg: #0f172a; --sidebar-w: 320px;
        }
        .light-mode {
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --input-bg: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); 
            color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden;
        }

        /* Sidebar History */
        .sidebar {
            position: fixed; top: 0; right: calc(var(--sidebar-w) * -1);
            width: var(--sidebar-w); height: 100%; background: var(--card);
            box-shadow: -5px 0 15px rgba(0,0,0,0.2); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 999;
        }
        .overlay.active { display: block; }

        /* Main UI */
        .main-content { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { 
            background: var(--card); padding: 30px; border-radius: 28px; 
            width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(128,128,128,0.1); position: relative;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .icon-btn { 
            background: none; border: 1px solid rgba(128,128,128,0.3); color: var(--text);
            cursor: pointer; padding: 8px 15px; border-radius: 12px; font-size: 0.8rem; font-weight: 600;
        }

        textarea { 
            width: 100%; height: 130px; background: var(--input-bg); color: var(--text); 
            border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; 
            padding: 15px; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); }

        .stats-row { display: flex; justify-content: space-between; font-size: 0.7rem; margin-top: 8px; opacity: 0.7; font-weight: bold; }

        /* Visualizer */
        .voice-wave {
            display: none; justify-content: center; align-items: center; gap: 4px; height: 40px; margin: 15px 0;
        }
        .voice-wave span {
            width: 4px; height: 10px; background: var(--accent); border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 35px; } }
        .voice-wave span:nth-child(2) { animation-delay: 0.1s; }
        .voice-wave span:nth-child(3) { animation-delay: 0.2s; }
        .voice-wave span:nth-child(4) { animation-delay: 0.3s; }
        .voice-wave span:nth-child(5) { animation-delay: 0.4s; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        select { background: var(--input-bg); color: var(--text); padding: 12px; border-radius: 10px; border: 1px solid rgba(128,128,128,0.2); cursor: pointer; }

        .btn-gen { 
            width: 100%; background: var(--accent); color: #000; font-weight: 800; 
            padding: 16px; border-radius: 14px; border: none; margin-top: 20px; cursor: pointer;
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-gen:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }

        /* History */
        .history-list { overflow-y: auto; flex-grow: 1; margin-top: 20px; }
        .h-item { 
            background: var(--input-bg); padding: 15px; border-radius: 15px; 
            margin-bottom: 12px; font-size: 0.85rem; border: 1px solid rgba(128,128,128,0.1);
        }
        .h-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .h-btn { padding: 6px 12px; border-radius: 8px; border: none; font-size: 0.7rem; color: #fff; cursor: pointer; text-decoration: none; font-weight: bold; }

        audio { width: 100%; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; font-size:1.2rem; color:var(--accent);">History</h2>
        <button class="icon-btn" onclick="toggleSidebar()">✕</button>
    </div>
    <div id="historyList" class="history-list"></div>
    <button onclick="clearHistory()" style="background:#ef4444; color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold;">Clear History</button>
</div>

<div class="main-content">
    <div class="card">
        <div class="top-bar">
            <button class="icon-btn" onclick="toggleMode()">🌓 Theme</button>
            <h1 style="margin:0; color:var(--accent); font-size:1.4rem; letter-spacing:-1px;">EliteTTS <span style="font-weight:300">Pro</span></h1>
            <button class="icon-btn" onclick="toggleSidebar()">📜 History</button>
        </div>

        <textarea id="textInput" placeholder="Enter text..." oninput="calculateStats()">Rex is ready. Type something and watch the visualizer dance!</textarea>
        
        <div class="stats-row">
            <span id="charCount">Chars: 0</span>
            <span id="estTime">Est: 0s</span>
        </div>

        <div class="grid">
            <div>
                <label style="font-size:0.65rem; font-weight:800; color:var(--accent); margin-left:5px;">VOICE MODEL</label>
                <select id="voiceSelect">
                    <option value="rex">Rex (AI Premium)</option>
                    <option value="malev1">Male V1</option>
                    <option value="malev2">Male V2</option>
                    <option value="famalev1">Female V1</option>
                    <option value="famalev2">Female V2</option>
                </select>
            </div>
            <div>
                <label style="font-size:0.65rem; font-weight:800; color:var(--accent); margin-left:5px;">SPEED: <span id="speedLabel">1.0</span>x</label>
                <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeed()" style="width:100%; margin-top:10px;">
            </div>
        </div>

        <div class="voice-wave" id="visualizer">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <button class="btn-gen" id="genBtn" onclick="generate()">GENERATE & PLAY</button>
        <div id="status" style="text-align:center; font-size:0.7rem; margin-top:12px; opacity:0.6; font-weight:bold;">Ready to sync</div>
        
        <audio id="player" controls></audio>
        
        <button class="icon-btn" onclick="copyText()" style="width:100%; margin-top:10px; border-style:dashed;">🔗 Copy Text to Clipboard</button>
    </div>
</div>

<script>
    let history = JSON.parse(localStorage.getItem('elite_tts_mega')) || [];
    const player = document.getElementById('player');
    const visualizer = document.getElementById('visualizer');

    // Visualizer Logic
    player.onplay = () => visualizer.style.display = 'flex';
    player.onpause = () => visualizer.style.display = 'none';
    player.onended = () => visualizer.style.display = 'none';

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function toggleMode() {
        document.body.classList.toggle('light-mode');
    }

    function calculateStats() {
        const text = document.getElementById('textInput').value;
        document.getElementById('charCount').innerText = `Chars: ${text.length}`;
        // Average speaking speed is about 15 chars per second
        const seconds = Math.ceil(text.length / 15);
        document.getElementById('estTime').innerText = `Est: ${seconds}s`;
    }

    function updateSpeed() {
        const val = document.getElementById('speedSlider').value;
        document.getElementById('speedLabel').innerText = val;
        player.playbackRate = val;
    }

    async function generate() {
        const text = document.getElementById('textInput').value.trim();
        const voice = document.getElementById('voiceSelect').value;
        const speed = document.getElementById('speedSlider').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('genBtn');

        if (!text) return;

        btn.disabled = true;
        status.innerText = "Processing AI Voice...";

        const url = `https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(text)}&voice=${voice}`;

        try {
            const response = await fetch(url);
            let audioUrl = '';
            
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("application/json")) {
                const data = await response.json();
                audioUrl = data.result || data.url || (data.data && data.data.url);
            } else {
                const blob = await response.blob();
                audioUrl = URL.createObjectURL(blob);
            }

            if (audioUrl) {
                player.src = audioUrl;
                player.playbackRate = speed;
                player.play();
                saveHistory(text, audioUrl, voice, speed);
                status.innerText = "Generated Successfully!";
            }
        } catch (e) {
            status.innerText = "Connection Failed.";
        } finally {
            btn.disabled = false;
        }
    }

    function saveHistory(text, url, voice, speed) {
        history.unshift({ text, url, voice, speed, time: new Date().toLocaleTimeString() });
        if (history.length > 20) history.pop();
        localStorage.setItem('elite_tts_mega', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        list.innerHTML = history.length ? '' : '<p style="text-align:center; opacity:0.5;">No history yet.</p>';
        history.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'h-item';
            div.innerHTML = `
                <div style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.text}</div>
                <div class="h-controls">
                    <span style="font-size:0.6rem; opacity:0.6;">${item.time} (${item.voice})</span>
                    <div style="display:flex; gap:5px;">
                        <button class="h-btn" style="background:#10b981" onclick="playH(${i})">Play</button>
                        <a href="${item.url}" download="Rex_Voice.mp3" class="h-btn" style="background:#6366f1">Save</a>
                    </div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function playH(i) {
        player.src = history[i].url;
        player.playbackRate = history[i].speed;
        player.play();
        toggleSidebar();
    }

    function copyText() {
        const text = document.getElementById('textInput');
        text.select();
        document.execCommand('copy');
        alert("Text copied to clipboard!");
    }

    function clearHistory() {
        if(confirm("Clear history?")) {
            history = [];
            localStorage.removeItem('elite_tts_mega');
            renderHistory();
        }
    }

    window.onload = () => {
        renderHistory();
        calculateStats();
    };
</script>

</body>
</html>
